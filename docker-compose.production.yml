services:
  postgres: { restart: unless-stopped }
  redis: { restart: unless-stopped }
  api:
    restart: unless-stopped
    ports: []
    healthcheck: { test: [CMD, wget, -qO-, http://localhost:4000/health], interval: 30s, timeout: 5s, retries: 3 }
  admin:
    restart: unless-stopped
    ports: []
  worker:
    restart: unless-stopped
    deploy: { resources: { limits: { memory: 2G } } }
