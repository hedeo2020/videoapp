services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securestream}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securestream}
      POSTGRES_DB: ${POSTGRES_DB:-securestream}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: { test: [CMD-SHELL, "pg_isready -U $${POSTGRES_USER:-securestream} -d $${POSTGRES_DB:-securestream}"], interval: 10s, timeout: 5s, retries: 5 }
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes: [redis-data:/data]
    healthcheck: { test: [CMD, redis-cli, ping], interval: 10s, timeout: 5s, retries: 5 }
  api:
    build: { context: ., dockerfile: apps/api/Dockerfile }
    env_file: .env
    ports: ["4000:4000"]
    volumes: [media-data:/data]
    depends_on: { postgres: { condition: service_healthy }, redis: { condition: service_healthy } }
  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file: .env
    ports: ["3000:3000"]
  worker:
    build: { context: ., dockerfile: apps/worker/Dockerfile }
    env_file: .env
    volumes: [media-data:/data]
    depends_on: { redis: { condition: service_healthy }, postgres: { condition: service_healthy } }
volumes: { postgres-data: {}, redis-data: {}, media-data: {} }
